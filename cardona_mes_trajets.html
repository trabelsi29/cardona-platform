<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARDONA — Mes trajets</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C8902A;
    --gold-dark: #B07D22;
    --dark: #221b16;
    --text-secondary: #574f43;
  }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #e3e0db; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-x: hidden; }
  .phone-frame { width: 860px; max-width: 100%; background: #F3F1EC; border-radius: 28px; padding: 40px 56px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); min-height: 640px; }
  .form-inner { max-width: 480px; margin: 0 auto; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .title { font-size: 20px; font-weight: 700; color: var(--dark); }
  .menu-wrapper { position: relative; flex-shrink: 0; }
  .mascot-mini { width: 40px; height: 40px; cursor: pointer; border-radius: 8px; }
  .dropdown-menu { display: none; position: absolute; top: 48px; right: 0; background: white; border-radius: 12px; box-shadow: 0 12px 30px rgba(0,0,0,0.18); min-width: 200px; overflow: hidden; z-index: 100; }
  .dropdown-menu.open { display: block; }
  .menu-item { padding: 12px 18px; font-size: 13px; color: var(--dark); cursor: pointer; border-bottom: 1px solid #f0f0f0; }
  .menu-item:last-child { border-bottom: none; }
  .menu-item:hover { background: #FDF8EE; }
  .menu-item-logout { color: #A32D2D; font-weight: 500; }

  .subtitle { font-size: 17px; color: var(--dark); text-align: center; margin: 10px 0 18px; }

  .tabs { display: flex; border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
  .tab { flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; background: #4a443d; color: white; }
  .tab.active { background: var(--gold); }

  .content-area { min-height: 200px; max-height: 480px; overflow-y: auto; padding-right: 2px; }
  .empty-state { text-align: center; padding: 50px 20px; color: var(--text-secondary); }
  .empty-state-icon { font-size: 32px; margin-bottom: 10px; }

  .trip-card { background: white; border-radius: 14px; padding: 18px; margin-bottom: 12px; }
  .trip-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .trip-ncc { font-size: 16px; font-weight: 700; color: var(--dark); font-family: monospace; }
  .trip-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: var(--gold); color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; }
  .trip-person { font-size: 13px; color: var(--dark); margin-bottom: 4px; }
  .trip-status { font-size: 13px; margin-bottom: 10px; }
  .status-confirme { color: #3B6D11; }
  .status-en_attente { color: #854F0B; }
  .status-refuse { color: #A32D2D; }
  .status-livre { color: #5F5E5A; }
  .trip-divider { border-top: 1px solid #eee; margin: 10px 0; }
  .section-title { font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.6px; margin: 18px 0 8px; }
  .section-title:first-child { margin-top: 0; }
  .trajet-group-header { font-size: 13px; font-weight: 600; color: var(--dark); background: #e9e6e1; border-radius: 8px; padding: 8px 12px; margin-bottom: 8px; display: flex; justify-content: space-between; }
  .trajet-group-date { color: var(--text-secondary); font-weight: 400; }
  .trip-route { font-size: 16px; font-weight: 700; color: var(--dark); display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .trip-detail { font-size: 13px; color: var(--dark); margin-bottom: 2px; }
  .trip-detail-label { color: var(--text-secondary); display: inline-block; min-width: 70px; }
  .trip-price-row { display: flex; justify-content: space-between; align-items: baseline; }
  .trip-price-label { font-size: 12px; color: var(--text-secondary); }
  .trip-price-value { font-size: 16px; font-weight: 700; color: var(--dark); }

  .reservation-actions { display: flex; gap: 8px; margin-top: 12px; }
  .btn-accept { flex: 1; padding: 9px; border-radius: 8px; border: none; background: #3B6D11; color: white; font-size: 12px; font-weight: 500; cursor: pointer; }
  .btn-refuse { flex: 1; padding: 9px; border-radius: 8px; border: 1px solid #ddd; background: white; color: #A32D2D; font-size: 12px; font-weight: 500; cursor: pointer; }

  .gate { text-align: center; padding: 60px 10px; }
  .gate-icon { font-size: 40px; margin-bottom: 14px; }
  .gate-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; color: var(--dark); }
  .gate-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .btn-primary { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--gold); color: white; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: block; text-align: center; }

  .bottom-nav { display: flex; border-top: 1px solid #e3e0db; margin-top: 18px; padding: 10px 4px 6px; position: sticky; bottom: 0; background: #ffffff; z-index: 50; }
  .bn-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none; cursor: pointer; padding: 4px; }
  .bn-icon-wrap { position: relative; display: inline-block; }
  .bn-icon-img { width: 24px; height: 24px; object-fit: contain; opacity: 0.75; filter: grayscale(1) brightness(0.7); }
  .bn-item.active .bn-icon-img { opacity: 1; filter: brightness(0); }
  .bn-label { font-size: 10px; color: #aaa; }
  .bn-item.active .bn-label { color: var(--gold); font-weight: 600; }
  .bn-badge { position: absolute; top: -6px; right: -9px; background: #E24B4A; color: white; font-size: 9px; min-width: 15px; height: 15px; border-radius: 8px; display: none; align-items: center; justify-content: center; padding: 0 3px; font-weight: 700; }
  .bn-badge.show { display: flex; }

  @media (max-width: 640px) {
    body { padding: 0; align-items: stretch; }
    .phone-frame { width: 100%; max-width: 100%; min-height: 100vh; border-radius: 0; padding: 24px 20px; box-shadow: none; }
    .form-inner { max-width: 100%; }
  }


  .bg-watermark { position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: cover; opacity: 0.15; z-index: 0; pointer-events: none; }
  .phone-frame { position: relative; z-index: 1; }

  /* ===================== BUREAU : texte un peu plus grand pour la lisibilité ===================== */
  @media (min-width: 641px) {
    .title { font-size: 18px; }
    .subtitle { font-size: 14px; }
    .field label { font-size: 13px; }
    .field input, .field textarea { font-size: 14.5px; }
    .btn-primary, .btn-outline, .btn-pay { font-size: 15px; }
    .cat-label, .category-pill { font-size: 15px; }
    .cat-desc { font-size: 12px; }
    .detail-row, .trip-detail, .home-row { font-size: 14px; }
    .t-name, .trip-person { font-size: 14px; }
  }
</style>
</head>

function injectIcons() {
  document.getElementById('icon-rechercher').src = 'data:image/png;base64,' + ICONS.rechercher;
  document.getElementById('icon-publier').src = 'data:image/png;base64,' + ICONS.publier;
  document.getElementById('icon-mestrajets').src = 'data:image/png;base64,' + ICONS.mestrajets;
  document.getElementById('icon-profil').src = 'data:image/png;base64,' + ICONS.profil;
  document.getElementById('menu-trigger').src = 'data:image/png;base64,' + ICONS.logo;
}

let userRole = null;

async function checkAccess() {
  injectIcons();
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    document.getElementById('step-gate').style.display = 'block';
    document.getElementById('main-content').style.display = 'none';
    return;
  }
  currentUser = session.user;
  document.getElementById('step-gate').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';

  const { data: profile } = await sb.from('profiles').select('role').eq('id', currentUser.id).single();
  userRole = profile?.role || 'expediteur';
  setupTabsForRole();

  await loadAll();
}

function setupTabsForRole() {
  const tabsEl = document.querySelector('.tabs');
  const subtitleEl = document.querySelector('.subtitle');
  if (userRole === 'both') {
    tabsEl.style.display = 'flex';
    subtitleEl.style.display = 'block';
    activeTab = 'expediteur';
  } else if (userRole === 'transporteur') {
    tabsEl.style.display = 'none';
    subtitleEl.style.display = 'none';
    activeTab = 'transporteur';
  } else {
    tabsEl.style.display = 'none';
    subtitleEl.style.display = 'none';
    activeTab = 'expediteur';
  }
}

function toggleMenu() { document.getElementById('dropdown-menu').classList.toggle('open'); }
function menuPlaceholder(label) { document.getElementById('dropdown-menu').classList.remove('open'); alert(label + ' — bientôt disponible.'); }
async function handleMenuLogout() {
  document.getElementById('dropdown-menu').classList.remove('open');
  await sb.auth.signOut();
  window.location.href = 'cardona_app.html';
}
document.addEventListener('click', (e) => {
  const wrapper = document.querySelector('.menu-wrapper');
  const menu = document.getElementById('dropdown-menu');
  if (wrapper && menu && !wrapper.contains(e.target)) menu.classList.remove('open');
});

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-expediteur').classList.toggle('active', tab === 'expediteur');
  document.getElementById('tab-transporteur').classList.toggle('active', tab === 'transporteur');
  render();
}

function modeLabel(m) {
  const map = { avion: '✈', camion_fourgon: '🚛', voiture: '🚗', train_bus: '🚆', autre: '❓' };
  return map[m] || '';
}
function categoryLabel(c) {
  const map = { marchandise: 'Marchandise', document: 'Léger', fragile: 'Fragile', electronique: 'Électronique', autre: 'Autre' };
  return map[c] || c || '—';
}
function statusInfo(s) {
  const map = {
    en_attente: { cls: 'status-en_attente', label: '⏳ En attente de confirmation' },
    confirme: { cls: 'status-confirme', label: '✅ Réservation confirmée' },
    refuse: { cls: 'status-refuse', label: '✕ Réservation refusée' },
    en_cours: { cls: 'status-confirme', label: '🚚 En cours de livraison' },
    livre: { cls: 'status-livre', label: '📦 Livré' },
    annule: { cls: 'status-refuse', label: '✕ Annulée' },
  };
  return map[s] || { cls: '', label: s };
}
function formatDate(v) {
  if (!v) return '—';
  return new Date(v).toLocaleDateString('fr-FR');
}
function initials(name) {
  if (!name) return '??';
  return name.split(' ').map(p => p[0]).join('').slice(0,2).toUpperCase();
}

// CHARGEMENT DES DONNÉES
// ============================================================
async function loadAll() {
  // --- Côté expéditeur : mes demandes envoyées ---
  const { data: myReservations } = await sb.from('reservations').select('*').eq('expediteur_id', currentUser.id).order('created_at', { ascending: false });
  expediteurReservations = myReservations || [];

  if (expediteurReservations.length > 0) {
    const trajetIds = [...new Set(expediteurReservations.map(r => r.trajet_id))];
    const { data: trajets } = await sb.from('trajets').select('*').in('id', trajetIds);
    const transporteurIds = [...new Set((trajets || []).map(t => t.transporteur_id))];
    const { data: transporteurs } = await sb.from('profiles').select('*').in('id', transporteurIds);
    const trajetMap = {}; (trajets || []).forEach(t => trajetMap[t.id] = t);
    const transpMap = {}; (transporteurs || []).forEach(t => transpMap[t.id] = t);
    expediteurReservations.forEach(r => { r._trajet = trajetMap[r.trajet_id]; r._transporteur = r._trajet ? transpMap[r._trajet.transporteur_id] : null; });
  }

  // --- Côté transporteur : demandes reçues sur mes trajets ---
  const { data: myTrajets } = await sb.from('trajets').select('*').eq('transporteur_id', currentUser.id);
  if (myTrajets && myTrajets.length > 0) {
    const ids = myTrajets.map(t => t.id);
    const { data: received } = await sb.from('reservations').select('*').in('trajet_id', ids).order('created_at', { ascending: false });
    transporteurReservations = received || [];
    const expIds = [...new Set(transporteurReservations.map(r => r.expediteur_id))];
    const { data: expediteurs } = await sb.from('profiles').select('*').in('id', expIds);
    const trajetMap = {}; myTrajets.forEach(t => trajetMap[t.id] = t);
    const expMap = {}; (expediteurs || []).forEach(e => expMap[e.id] = e);
    transporteurReservations.forEach(r => { r._trajet = trajetMap[r.trajet_id]; r._expediteur = expMap[r.expediteur_id]; });
  } else {
    transporteurReservations = [];
  }

  document.getElementById('count-expediteur').textContent = expediteurReservations.length;
  document.getElementById('count-transporteur').textContent = transporteurReservations.length;

  const pendingCount = transporteurReservations.filter(r => r.statut === 'en_attente').length;
  const badge = document.getElementById('bn-badge-mestrajets');
  badge.textContent = pendingCount;
  badge.classList.toggle('show', pendingCount > 0);

  render();
}

function renderReservationCard(r, person, personLabel, showActions) {
  const t = r._trajet;
  const st = statusInfo(r.statut);
  const ram = t ? t.lieu_ramassage : '—';
  const dist = t ? t.lieu_distribution : '—';
  return `
    <div class="trip-card">
      <div class="trip-head">
        <div><div class="trip-ncc">NCC : ${r.ncc}</div></div>
        ${person?.avatar_url ? `<img class="trip-avatar" src="${person.avatar_url}">` : `<div class="trip-avatar">${initials(person?.full_name)}</div>`}
      </div>
      <div class="trip-person">${person?.full_name || personLabel}</div>
      <div class="trip-status ${st.cls}">${st.label}</div>
      <div class="trip-divider"></div>
      <div class="trip-detail"><span class="trip-detail-label">Colis</span>${categoryLabel(r.categorie)} (${r.poids_kg || '—'}Kg)</div>
      <div class="trip-divider"></div>
      <div class="trip-price-row">
        <span class="trip-price-label">Cash à la livraison</span>
        <span class="trip-price-value">${r.prix_transporteur} €</span>
      </div>
      ${showActions && r.statut === 'en_attente' ? `
        <div class="reservation-actions">
          <button class="btn-accept" onclick="updateReservation('${r.id}', 'confirme')">Accepter</button>
          <button class="btn-refuse" onclick="updateReservation('${r.id}', 'refuse')">Refuser</button>
        </div>` : ''}
    </div>`;
}

function render() {
  const area = document.getElementById('content-area');

  if (activeTab === 'expediteur') {
    if (expediteurReservations.length === 0) {
      area.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📦</div>Aucun envoi pour l'instant.</div>`;
      return;
    }
    area.innerHTML = expediteurReservations.map(r => renderReservationCard(r, r._transporteur, 'Transporteur', false)).join('');
    return;
  }

  // --- Côté transporteur : regroupé par trajet (route + date), séparé À traiter / Acceptées ---
  if (transporteurReservations.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📦</div>Aucune demande reçue pour l'instant.</div>`;
    return;
  }

  const groups = {};
  transporteurReservations.forEach(r => {
    const t = r._trajet;
    const key = t ? t.id : 'inconnu';
    if (!groups[key]) groups[key] = { trajet: t, items: [] };
    groups[key].items.push(r);
  });

  const sections = [
    { title: 'À traiter', filter: r => r.statut === 'en_attente', showActions: true },
    { title: 'Acceptées', filter: r => r.statut === 'confirme' || r.statut === 'en_cours', showActions: false },
    { title: 'Autres', filter: r => !['en_attente', 'confirme', 'en_cours'].includes(r.statut), showActions: false },
  ];

  let html = '';
  sections.forEach(section => {
    const groupEntries = Object.values(groups)
      .map(g => ({ trajet: g.trajet, items: g.items.filter(section.filter) }))
      .filter(g => g.items.length > 0);

    if (groupEntries.length === 0) return;

    html += `<div class="section-title">${section.title}</div>`;
    groupEntries.forEach(g => {
      const t = g.trajet;
      html += `<div class="trajet-group-header">${modeLabel(t?.mode_transport)} ${t ? t.lieu_ramassage + ' → ' + t.lieu_distribution : 'Trajet'} <span class="trajet-group-date">${formatDate(t?.date_ramassage)}</span></div>`;
      html += g.items.map(r => renderReservationCard(r, r._expediteur, 'Expéditeur', section.showActions)).join('');
    });
  });

  area.innerHTML = html;
}

async function updateReservation(reservationId, statut) {
  const { data: reservation, error } = await sb.from('reservations').update({ statut }).eq('id', reservationId).select('frais_service').single();
  if (error) { alert('Erreur : ' + error.message); return; }

  if (statut === 'confirme') {
    const { error: paiementError } = await sb.from('paiements').insert({
      reservation_id: reservationId,
      montant: reservation.frais_service || 2.00,
      methode: 'carte',
      statut: 'paye'
    });
    if (paiementError) alert('Réservation confirmée, mais erreur lors du prélèvement de la commission : ' + paiementError.message);
  }

  await loadAll();
}

checkAccess();
</script>
