function injectIcons() {
  // Menu trigger (logo)
  var mt = document.getElementById('menu-trigger');
  if (mt && typeof ICONS !== 'undefined') mt.src = 'data:image/png;base64,' + ICONS.logo;
}

let userRole = null;

async function checkAccess() {
  injectIcons();
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    document.getElementById('step-gate').style.display = 'block';
    document.getElementById('main-content').style.display = 'none';
    // nav buildNav
    return;
  }
  currentUser = session.user;
  document.getElementById('step-gate').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  // nav buildNav

  const { data: profile } = await sb.from('profiles').select('role, is_suspended').eq('id', currentUser.id).single();
  if (profile && profile.is_suspended) {
    await sb.auth.signOut();
    window.location.href = 'index.html';
    return;
  }
  userRole = profile?.role || 'expediteur';
  // Mettre à jour le titre selon le rôle
  var titleEl = document.getElementById('page-title');
  if (titleEl) titleEl.textContent = userRole === 'transporteur' ? 'Mes trajets' : 'Mes envois';
  var subtEl = document.getElementById('subtitle-role');
  if (subtEl) subtEl.style.display = 'block';
  setupTabsForRole();

  await loadAll();
  buildNav(userRole === 'transporteur' ? 'mestrajets' : 'mesenvois');
}

function setupTabsForRole() {
  const tabsEl = document.querySelector('.tabs');
  const subtitleEl = document.querySelector('.subtitle');
  if (tabsEl) tabsEl.style.display = 'none';
  if (subtitleEl) subtitleEl.style.display = 'none';
  activeTab = userRole === 'transporteur' ? 'transporteur' : 'expediteur';
}

function toggleMenu() { document.getElementById('dropdown-menu').classList.toggle('open'); }
function menuPlaceholder(label) { document.getElementById('dropdown-menu').classList.remove('open'); alert(label + ' — bientôt disponible.'); }
async function handleMenuLogout() {
  document.getElementById('dropdown-menu').classList.remove('open');
  await sb.auth.signOut();
  window.location.href = 'index.html';
}
document.addEventListener('click', (e) => {
  const wrapper = document.querySelector('.menu-wrapper');
  const menu = document.getElementById('dropdown-menu');
  if (wrapper && menu && !wrapper.contains(e.target)) menu.classList.remove('open');
});

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-expediteur').classList.toggle('active', tab === 'expediteur');
  document.getElementById('tab-transporteur').classList.toggle('active', tab === 'transporteur');
  render();
}

function modeLabel(m) {
  const map = { avion: '✈', camion_fourgon: '🚛', voiture: '🚗', train_bus: '🚆', autre: '❓' };
  return map[m] || '';
}
function categoryLabel(c) {
  const map = { marchandise: 'Marchandise', document: 'Léger', fragile: 'Fragile', electronique: 'Électronique', autre: 'Autre' };
  return map[c] || c || '—';
}
function statusInfo(s) {
  const map = {
    en_attente: { cls: 'status-en_attente', label: '⏳ En attente de confirmation' },
    confirme: { cls: 'status-confirme', label: '✅ Réservation confirmée' },
    refuse: { cls: 'status-refuse', label: '✕ Réservation refusée' },
    en_cours: { cls: 'status-confirme', label: '🚚 En cours de livraison' },
    livre: { cls: 'status-livre', label: '✅ Livré' },
    annule: { cls: 'status-refuse', label: '✕ Annulée' },
  };
  return map[s] || { cls: '', label: s };
}
function formatDate(v) {
  if (!v) return '—';
  return new Date(v).toLocaleDateString('fr-FR');
}
function initials(name) {
  if (!name) return '??';
  return name.split(' ').map(p => p[0]).join('').slice(0,2).toUpperCase();
}

async function loadAll() {
  // --- Côté expéditeur : mes demandes envoyées ---
  const { data: myReservations } = await sb.from('reservations').select('*').eq('expediteur_id', currentUser.id).order('created_at', { ascending: false });
  expediteurReservations = myReservations || [];

  if (expediteurReservations.length > 0) {
    const trajetIds = [...new Set(expediteurReservations.map(r => r.trajet_id))];
    const { data: trajets } = await sb.from('trajets').select('*').in('id', trajetIds);
    const transporteurIds = [...new Set((trajets || []).map(t => t.transporteur_id))];
    const { data: transporteurs } = await sb.from('profiles').select('*').in('id', transporteurIds);
    const trajetMap = {}; (trajets || []).forEach(t => trajetMap[t.id] = t);
    const transpMap = {}; (transporteurs || []).forEach(t => transpMap[t.id] = t);
    expediteurReservations.forEach(r => { r._trajet = trajetMap[r.trajet_id]; r._transporteur = r._trajet ? transpMap[r._trajet.transporteur_id] : null; });
  }

  // --- Côté transporteur : demandes reçues sur mes trajets ---
  const { data: trajetsData } = await sb.from('trajets').select('*').eq('transporteur_id', currentUser.id).neq('statut', 'annule').order('date_ramassage', { ascending: false });
  myTrajets = trajetsData || [];
  if (myTrajets.length > 0) {
    const ids = myTrajets.map(t => t.id);
    const { data: received } = await sb.from('reservations').select('*').in('trajet_id', ids).order('created_at', { ascending: false });
    transporteurReservations = received || [];
    const expIds = [...new Set(transporteurReservations.map(r => r.expediteur_id))];
    const { data: expediteurs } = await sb.from('profiles').select('*').in('id', expIds);
    const trajetMap = {}; myTrajets.forEach(t => trajetMap[t.id] = t);
    const expMap = {}; (expediteurs || []).forEach(e => expMap[e.id] = e);
    transporteurReservations.forEach(r => { r._trajet = trajetMap[r.trajet_id]; r._expediteur = expMap[r.expediteur_id]; });
  } else {
    transporteurReservations = [];
  }

  // Badge dans la nav (via buildNav)

  render();
}

function catLabel(cat){
  var m={marchandise:"Marchandise",document:"Document",fragile:"Fragile",electronique:"Électronique",autre:"Autre"};
  return m[cat]||cat;
}
function shorten(addr) {
  if (!addr) return '—';
  return addr.split(',')[0].trim();
}

function toggleAccordion(trajetId) {
  var resa = document.getElementById('resa-' + trajetId);
  var arrow = document.getElementById('arrow-' + trajetId);
  if (!resa) return;
  resa.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open');
}

function modifierTrajet(trajetId) {
  window.location.href = "modifier.html?id=" + trajetId;
}


function renderReservationCard(r, person, personLabel, showActions) {
  const t = r._trajet;
  const st = statusInfo(r.statut);
  const ram = t ? t.lieu_ramassage : '—';
  const dist = t ? t.lieu_distribution : '—';
  return `
    <div class="trip-card">
      <div class="trip-head">
        <div>
          <div class="trip-ncc">🔐 Code : ${r.ncc}</div>
          <div style="font-size:11px;color:var(--text-secondary);margin-top:2px;">${ram} → ${dist}</div>
        </div>
        ${person?.avatar_url ? `<img class="trip-avatar" src="${person.avatar_url}">` : `<div class="trip-avatar">${initials(person?.full_name)}</div>`}
      </div>
      <div class="trip-person">${person?.full_name || personLabel}</div>
      <div class="trip-status ${st.cls}">${st.label}</div>
      <div class="trip-divider"></div>
      <div class="trip-detail"><span class="trip-detail-label">Colis</span>${(r.categories&&r.categories.length?r.categories.map(categoryLabel).join(', '):categoryLabel(r.categorie))} (${r.poids_kg || '—'}Kg)</div>
      ${r.description ? `<div class="trip-detail"><span class="trip-detail-label">Note</span>${r.description}</div><div class="trip-divider"></div>` : ''}
      <div class="trip-price-row">
        <span class="trip-price-label">Cash à la livraison</span>
        <span class="trip-price-value">${r.prix_transporteur} €</span>
      </div>
      ${showActions && r.statut === 'en_attente' ? `
        <div class="reservation-actions">
          <button class="btn-accept" onclick="updateReservation('${r.id}', 'confirme')">Accepter</button>
          <button class="btn-refuse" onclick="updateReservation('${r.id}', 'refuse')">Refuser</button>
        </div>` : ''}
    </div>`;
}

function render() {
  var area = document.getElementById("content-area");
  if (!area) return;

  if (activeTab === "expediteur") {
    if (expediteurReservations.length === 0) {
      area.innerHTML = "<div class='empty-state'><div class='empty-state-icon'>📦</div>Aucun envoi pour l'instant.</div>";
      return;
    }
    area.innerHTML = expediteurReservations.map(function(r) {
      return renderReservationCard(r, r._transporteur, "Transporteur", false);
    }).join("");
    return;
  }

  if (myTrajets.length === 0) {
    area.innerHTML = "<div class='empty-state'><div class='empty-state-icon'>🚛</div>Aucun trajet publié.<br><br><a href='publier.html' style='color:var(--gold);font-weight:600;'>Publier un trajet →</a></div>";
    return;
  }

  var modeIcons = { avion: "✈", camion_fourgon: "🚛", voiture: "🚗", train_bus: "🚆", autre: "❓" };
  var statusLabels = { en_attente: "⏳ En attente", confirme: "✅ Confirmée", refuse: "❌ Refusée", en_cours: "🚚 En cours", livre: "📦 Livré" };
  var catLabels = { marchandise: "Marchandise", document: "Document", fragile: "Fragile", electronique: "Électronique", autre: "Autre" };

  var html = myTrajets.map(function(t) {
    var resas = transporteurReservations.filter(function(r) { return r.trajet_id === t.id; });
    var nbAttente = resas.filter(function(r) { return r.statut === "en_attente"; }).length;
    var isExpire = t.date_ramassage && new Date(t.date_ramassage) < new Date(Date.now() - 86400000);
    var dateStr = t.date_ramassage ? new Date(t.date_ramassage).toLocaleDateString("fr-FR", {day:"numeric",month:"long",year:"numeric"}) : "—";
    var modeIcon = modeIcons[t.mode_transport] || "🚗";
    var statusBadge = isExpire
      ? "<span class='trajet-status status-expire'>Expiré</span>"
      : "<span class='trajet-status status-actif'>Actif</span>";
    var accordionLabel = resas.length === 0 ? "Aucune réservation" : resas.length + " réservation" + (resas.length > 1 ? "s" : "");
    var pendingBadge = nbAttente > 0 ? " <span class='accordion-badge-pending'>· " + nbAttente + " en attente</span>" : "";
    var isOpen = nbAttente > 0;

    var resasHtml = resas.map(function(r) {
      var exp = r._expediteur || {};
      var initls = (exp.full_name || "?").split(" ").map(function(p){ return p[0]; }).join("").slice(0,2).toUpperCase();
      var avatarHtml = exp.avatar_url
        ? "<img src='" + exp.avatar_url + "' style='width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;'>"
        : "<div class='resa-avatar'>" + initls + "</div>";
      var statusLabel = statusLabels[r.statut] || r.statut;
      var cats = Array.isArray(r.categories) ? r.categories.map(function(cat){return catLabels[cat]||cat;}).join(", ") : (r.categorie || "—");
      var actions = r.statut === "en_attente"
        ? "<div class='resa-actions'><button class='btn-accept' onclick='updateStatut(&quot;" + r.id + "&quot;,&quot;confirme&quot;)'>✓ Accepter</button><button class='btn-refuse-sm' onclick='updateStatut(&quot;" + r.id + "&quot;,&quot;refuse&quot;)'>✕ Refuser</button></div>"
        : r.statut === "confirme"
          ? "<div class='resa-actions'>" + "<button class='btn-livrer' id='btn-livrer-" + r.id + "' onclick='afficherFormCode(&quot;" + r.id + "&quot;)'>📦 Valider livraison</button>" + "<div class='livraison-form' id='form-" + r.id + "'>" + "<div class='livraison-hint'>Saisissez le code secret communiqué par l'expéditeur</div>" + "<input type='text' id='input-" + r.id + "' maxlength='4' placeholder='- - - -' oninput='this.value=this.value.toUpperCase()'>" + "<div class='livraison-btns'>" + "<button class='btn-annuler-code' onclick='masquerFormCode(&quot;" + r.id + "&quot;)'>Annuler</button>" + "<button class='btn-confirmer-code' onclick='validerCodeLivraison(&quot;" + r.id + "&quot;,&quot;" + r.ncc + "&quot;)'>✓ Confirmer</button>" + "</div></div></div>"
          : "";
      return "<div class='resa-card'>"
        + "<div class='resa-head'><div><div class='resa-name'>" + (exp.full_name || "Expéditeur") + "</div>"
        + "<div style='font-size:11px;color:var(--text-secondary);'>" + (t ? shorten(t.lieu_ramassage,20)+" → "+shorten(t.lieu_distribution,20) : "") + "</div></div>" + avatarHtml + "</div>"
        + "<div class='resa-status " + r.statut + "'>" + statusLabel + "</div>"
        + "<div class='resa-details'>Colis : " + (r.categories&&r.categories.length?r.categories.map(catLabel).join(', '):catLabel(r.categorie)) + (r.poids_kg ? " (" + r.poids_kg + " kg)" : "") + "</div>"
        + (r.description ? "<div class='resa-details' style='color:var(--text-secondary);font-style:italic;font-size:12px;'>" + r.description + "</div>" : "")
        + "<div class='resa-price'>" + (r.prix_transporteur || "—") + " €</div>"
        + actions
        + "</div>";
    }).join("");

    return "<div class='trajet-card-main'>"
      + "<div class='trajet-card-header'>"
      + "<div class='trajet-info'><div class='trajet-mode-route'>" + modeIcon + " " + shorten(t.lieu_ramassage) + " → " + shorten(t.lieu_distribution) + "</div><div class='trajet-meta'>📅 " + dateStr + "</div></div>"
      + "<div class='trajet-right'>" + statusBadge
      + "<button class='trajet-modify-btn' onclick='voirDetail(event,&quot;" + t.id + "&quot;)'>🔍 Détail</button>"
      + (!isExpire ? "<button class='trajet-modify-btn' onclick='modifierTrajet(&quot;" + t.id + "&quot;)'>✏ Modifier</button>" : "")
      + "</div>"
      + "</div>"
      + "<div class='trajet-accordion'>"
      + "<div class='trajet-accordion-toggle' onclick='toggleAccordion(&quot;" + t.id + "&quot;)'>"
      + "<span><span class='accordion-label'>" + accordionLabel + "</span>" + pendingBadge + "</span>"
      + "<span class='accordion-arrow" + (isOpen ? " open" : "") + "' id='arrow-" + t.id + "'>›</span>"
      + "</div>"
      + "<div class='trajet-reservations" + (isOpen ? " open" : "") + "' id='resa-" + t.id + "'>" + resasHtml + "</div>"
      + "</div>"
      + "</div>";
  }).join("");

  area.innerHTML = html;
}

async function updateStatut(reservationId, statut) {
  const { error } = await sb.from('reservations').update({ statut }).eq('id', reservationId);
  if (error) { alert('Erreur : ' + error.message); return; }
  // Remboursement automatique si refus
  if (statut === 'refuse') {
    try {
      var { data: resaData } = await sb.from('reservations').select('payment_intent_id, expediteur_id').eq('id', reservationId).single();
      if (resaData && resaData.payment_intent_id) {
        await fetch('https://cardona-stripe.trabelsi-med-amine.workers.dev', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'refund', payment_intent_id: resaData.payment_intent_id })
        });
        // Notifier l'expéditeur du remboursement
        await sb.from('notifications').insert({
          user_id: resaData.expediteur_id,
          type: 'remboursement',
          content: 'Votre réservation a été refusée. Les frais de 3€ vous seront remboursés sous 5-10 jours.'
        }).then(function(){}).catch(function(){});
      }
    } catch(e) { console.warn('Remboursement:', e); }
  }
  if (statut === 'confirme') {
    const { data: resa } = await sb.from('reservations').select('frais_service').eq('id', reservationId).single();
    await sb.from('paiements').insert({ reservation_id: reservationId, montant: resa?.frais_service || 2, methode: 'carte', statut: 'paye' });
  }
  await loadAll();
}

async function buildNav(activePage) {
  var nav = document.getElementById('bottom-nav');
  if (!nav) return;
  var sessRes = await sb.auth.getSession();
  if (!sessRes.data.session) { nav.style.display = 'none'; return; }
  var uid = sessRes.data.session.user.id;
  var profRes = await sb.from('profiles').select('role').eq('id', uid).single();
  var role = (profRes.data && profRes.data.role) || 'expediteur';

  var items;
  if (role === 'expediteur') {
    items = [
      { id: 'rechercher', label: 'Rechercher', icon: 'rechercher', href: 'rechercher.html' },
      { id: 'mesenvois',  label: 'Mes envois',  icon: 'mestrajets', href: 'trajets.html', badge: true },
      { id: 'profil',     label: 'Profil',      icon: 'profil',     href: 'index.html' },
    ];
  } else {
    items = [
      { id: 'publier',    label: 'Publier',    icon: 'publier',    href: 'publier.html' },
      { id: 'mestrajets', label: 'Mes trajets', icon: 'mestrajets', href: 'trajets.html', badge: true },
      { id: 'profil',     label: 'Profil',      icon: 'profil',     href: 'index.html' },
    ];
  }

  nav.style.display = 'flex';
  nav.innerHTML = items.map(function(it) {
    var isActive = it.id === activePage || (activePage === 'mesenvois' && it.id === 'mesenvois') || (activePage === 'mestrajets' && it.id === 'mestrajets');
    var activeClass = isActive ? ' active' : '';
    var tag = it.href === '#' ? 'div' : 'a';
    var hrefAttr = it.href !== '#' ? ' href="' + it.href + '"' : '';
    var badgeHTML = it.badge ? '<span class="bn-badge" id="bn-badge-main">0</span>' : '';
    return '<' + tag + ' class="bn-item' + activeClass + '"' + hrefAttr + '>'
      + '<span class="bn-icon-wrap"><img class="bn-icon-img" id="ni-' + it.id + '" src="">' + badgeHTML + '</span>'
      + '<span class="bn-label">' + it.label + '</span>'
      + '<span class="bn-underline"></span>'
      + '</' + tag + '>';
  }).join('');

  items.forEach(function(it) {
    var el = document.getElementById('ni-' + it.id);
    if (el && NAV_ICONS[it.icon]) el.src = 'data:image/png;base64,' + NAV_ICONS[it.icon];
  });

  // Badge réservations en attente (transporteur)
  if (role === 'transporteur') {
    sb.from('trajets').select('id').eq('transporteur_id', uid).then(function(r1) {
      if (!r1.data || !r1.data.length) return;
      sb.from('reservations').select('id', { count: 'exact', head: true })
        .in('trajet_id', r1.data.map(function(t) { return t.id; }))
        .eq('statut', 'en_attente').then(function(r2) {
          var badge = document.getElementById('bn-badge-main');
          if (badge) { badge.textContent = r2.count || 0; badge.classList.toggle('show', (r2.count || 0) > 0); }
        });
    });
  }
  return role;
}


function voirDetail(event, trajetId) {
  event.stopPropagation();
  var t = myTrajets.find(function(x) { return x.id === trajetId; });
  if (!t) return;

  var modeLabels = { avion: '✈ Avion', camion_fourgon: '🚛 Camion/Fourgon', voiture: '🚗 Voiture', train_bus: '🚆 Train/Bus', autre: '❓ Autre' };
  var catLabels = { marchandise: 'Marchandises', document: 'Documents', fragile: 'Produits fragiles', electronique: 'Produits électroniques', autre: 'Autre' };
  var dateRam = t.date_ramassage ? new Date(t.date_ramassage).toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long',year:'numeric'}) : '—';
  var dateDist = t.date_distribution ? new Date(t.date_distribution).toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long',year:'numeric'}) : '—';

  document.getElementById('modal-trajet-title').textContent = shorten(t.lieu_ramassage) + ' → ' + shorten(t.lieu_distribution);

  var cats = Array.isArray(t.categories_acceptees) ? t.categories_acceptees : [];
  var prixCat = t.prix_categories || {};

  var prixHtml = '';
  if (Object.keys(prixCat).length > 0) {
    prixHtml = '<div class="modal-section"><div class="modal-label">Tarifs par catégorie</div>';
    Object.keys(prixCat).forEach(function(cat) {
      var p = prixCat[cat];
      var label = catLabels[cat] || cat;
      var prix;
      // Format ancien : {unit:"kg", value:5} ou Format nouveau : {type:"kg", prix:5}
      if (typeof p === 'object') {
        var val = p.value !== undefined ? p.value : p.prix;
        var unit = p.unit || p.type || 'kg';
        prix = val + (unit === 'forfait' ? ' € (forfait)' : ' €/kg');
      } else {
        prix = p + ' €';
      }
      prixHtml += '<div class="prix-cat-ligne"><span>' + label + '</span><span style="font-weight:600;color:var(--gold);">' + prix + '</span></div>';
    });
    prixHtml += '</div>';
  } else if (cats.length > 0) {
    prixHtml = '<div class="modal-section"><div class="modal-label">Catégories acceptées</div><div class="modal-value">' + cats.map(function(cat){return catLabels[cat]||cat;}).join(', ') + '</div></div>';
  } else {
    prixHtml = '<div class="modal-section"><div class="modal-label">Tarifs</div><div class="modal-value" style="color:var(--text-secondary);">Non renseignés</div></div>';
  }

  var content = '<div class="modal-row">'
    + '<div class="modal-section"><div class="modal-label">Mode de transport</div><div class="modal-value">' + (modeLabels[t.mode_transport] || t.mode_transport || '—') + '</div></div>'
    + '<div class="modal-section"><div class="modal-label">Statut</div><div class="modal-value">' + (t.statut || '—') + '</div></div>'
    + '</div>'
    + '<div class="modal-row">'
    + '<div class="modal-section"><div class="modal-label">🟢 Ramassage</div><div class="modal-value">' + (t.stops_ramassage && t.stops_ramassage.length > 1 ? t.stops_ramassage.map(function(s,idx){return (idx+1)+'. '+s.adresse;}).join('<br>') : (t.lieu_ramassage || '—')) + '</div><div style="font-size:12px;color:var(--text-secondary);margin-top:3px;">📅 ' + dateRam + '</div></div>'
    + '<div class="modal-section"><div class="modal-label">🔴 Distribution</div><div class="modal-value">' + (t.stops_distribution && t.stops_distribution.length > 1 ? t.stops_distribution.map(function(s,idx){return (idx+1)+'. '+s.adresse;}).join('<br>') : (t.lieu_distribution || '—')) + '</div><div style="font-size:12px;color:var(--text-secondary);margin-top:3px;">📅 ' + dateDist + '</div></div>'
    + '</div>'
    + prixHtml;

  document.getElementById('modal-trajet-content').innerHTML = content;
  document.getElementById('modal-detail').classList.add('open');
}

function fermerDetail(event) {
  if (event.target === document.getElementById('modal-detail')) {
    document.getElementById('modal-detail').classList.remove('open');
  }
}

async function handleLogout() {
  await sb.auth.signOut();
  window.location.href = "index.html";
}

function afficherFormCode(resaId) {
  var form = document.getElementById("form-" + resaId);
  var btn = document.getElementById("btn-livrer-" + resaId);
  if (form) form.classList.add("visible");
  if (btn) btn.style.display = "none";
  var input = document.getElementById("input-" + resaId);
  if (input) { input.value = ""; input.focus(); }
}

function masquerFormCode(resaId) {
  var form = document.getElementById("form-" + resaId);
  var btn = document.getElementById("btn-livrer-" + resaId);
  if (form) form.classList.remove("visible");
  if (btn) btn.style.display = "";
}

async function validerCodeLivraison(resaId, codeAttendu) {
  var input = document.getElementById("input-" + resaId);
  if (!input) return;
  var saisie = input.value.trim().toUpperCase();
  if (saisie !== codeAttendu.toUpperCase()) {
    input.classList.add("error");
    setTimeout(function() { input.classList.remove("error"); }, 400);
    input.value = "";
    input.placeholder = "Code incorrect !";
    setTimeout(function() { input.placeholder = "- - - -"; }, 1500);
    return;
  }
  // Code correct
  input.disabled = true;
  const { error } = await sb.from("reservations").update({ statut: "livre" }).eq("id", resaId);
  if (error) { alert("Erreur : " + error.message); input.disabled = false; return; }
  // Notifier l'expéditeur
  var { data: resa } = await sb.from("reservations").select("expediteur_id, trajet_id").eq("id", resaId).single();
  if (resa) {
    await sb.from("notifications").insert({ user_id: resa.expediteur_id, trajet_id: resa.trajet_id, type: "livre", content: "Votre colis a été livré avec succès !" });
  }
  loadAll();
}
</script>

    <div class="modal-title" id="modal-trajet-title">Détail du trajet</div>
    <div id="modal-trajet-content"></div>
  </div>
</div>
